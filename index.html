<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32x32.png">
  <title>QR code component</title>

  <!-- stylesheet -->
  <link rel="stylesheet" href="style.css">

  <!-- Font-family -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">

</head>

<body>
  <main class="main">
    <div class="qr-code">
      <figure class="qr-code__img-wrapper">
        <img class="qr-code__img" src="images/image-qr-code.png" alt="qr code of frontendmentor.com">
      </figure>
      <h2 class="qr-code__title">
        Improve your front-end skills by building projects
      </h2>
      <p class="qr-code__description">
        Scan The QR code to visit to frontendmentor and take your coding skills to the next level
      </p>
    </div>
  </main>
  <footer class="attribution">
    <p class="footer-content">
      Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
      Coded by Vinayak Kamble.
    </p>
  </footer>
</body>

</html>
